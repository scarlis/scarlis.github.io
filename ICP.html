<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Control Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Arial Narrow', sans-serif; background-color: #000; color: #fff; margin: 0; }
        .arial-narrow { font-family: 'Arial Narrow', Arial, sans-serif; }
        
        /* Layout */
        #top-bar { height: 60px; background: #000; border-bottom: 1px solid #333; }
        #main-content { display: flex; height: calc(100vh - 60px); }
        #map { width: 50%; height: 100%; background: #222; }
        #right-panel { width: 50%; height: 100%; overflow-y: auto; background: #000; }

        /* Custom Styles */
        .unit-table-text { color: #ADD8E6; } /* Light Blue */
        .log-text { color: #FFB6B6; } /* Light Red */
        .modal { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        
        /* Sector Text Overlay */
        .sector-label {
            background: transparent;
            border: none;
            box-shadow: none;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 2px #000;
        }

        .btn-orange { background-color: #ff8c00 !important; color: white; }
        .btn-grey { background-color: #333; color: white; }
    </style>
</head>
<body>

    <header id="top-bar" class="flex items-center justify-between px-4 text-sm">
        <div class="flex items-center space-x-6">
            <div id="clock" class="text-xl font-bold w-24">00:00:00</div>
            <div id="weather" class="text-xs">Fetching Weather...</div>
        </div>

        <div class="flex items-center space-x-4">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase text-gray-400">Incident Description:</span>
                <button onclick="openModal('incident')" id="incident-display" class="text-left hover:text-blue-400 truncate w-48">No Description Set</button>
            </div>
            
            <button id="sector-toggle" onclick="toggleSectorMode()" class="btn-grey px-3 py-2 rounded font-bold uppercase text-xs transition-colors">
                Add Sector
            </button>

            <button onclick="openModal('operator')" class="bg-zinc-800 px-3 py-2 rounded text-xs border border-zinc-700">
                OP: <span id="operator-display">NOT SET</span>
            </button>
        </div>
    </header>

    <main id="main-content">
        <div id="map"></div>

        <div id="right-panel" class="p-4 border-l border-zinc-800">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                    <h2 class="text-xl font-bold uppercase tracking-wider">Response Teams</h2>
                    <button onclick="addUnitRow()" class="bg-blue-600 hover:bg-blue-500 p-1 rounded">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <table class="w-full text-left unit-table-text">
                    <thead>
                        <tr class="text-[10px] uppercase text-gray-500 border-b border-zinc-900">
                            <th class="pb-2">Unit Description</th>
                            <th class="pb-2 w-20">Personnel</th>
                            <th class="pb-2 w-24">SitRep</th>
                        </tr>
                    </thead>
                    <tbody id="unit-table-body">
                        </tbody>
                </table>
            </div>

            <div id="log-container">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-red-400 font-bold uppercase">Incident Log</h2>
                    <button onclick="backupLog()" class="text-[10px] bg-zinc-800 px-2 py-1 rounded hover:bg-zinc-700">BACKUP LOG</button>
                </div>
                <div id="log-flow" class="log-text text-sm space-y-1">
                    </div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal fixed inset-0 hidden flex items-center justify-center z-[2000]">
        <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-lg w-96">
            <h3 id="modal-title" class="text-lg font-bold mb-4">Update</h3>
            <input type="text" id="modal-input" class="w-full bg-black border border-zinc-600 p-2 text-white mb-4">
            <div class="flex justify-end space-x-2">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-400">Cancel</button>
                <button onclick="saveModal()" class="px-4 py-2 bg-blue-600 rounded">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // --- INITIALIZATION ---
        let map, sectorPoints = [], isSectorMode = false;
        let currentModalAction = '';
        let sitrepTimers = {};

        document.addEventListener('DOMContentLoaded', () => {
            initClock();
            initMap();
            fetchWeather();
            loadLog();
            setInterval(fetchWeather, 120000); // 2 min update
            lucide.createIcons();
        });

        // --- CLOCK ---
        function initClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
            }, 1000);
        }

        // --- MAP LOGIC ---
        function initMap() {
            map = L.map('map').setView([-25.27, 133.77], 4); // Default Australia
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OSM'
            }).addTo(map);

            // Mouse Lat/Long
            const coordsDiv = document.createElement('div');
            coordsDiv.className = 'absolute bottom-2 left-2 bg-black/50 p-1 text-[10px] z-[1000]';
            coordsDiv.id = 'map-coords';
            document.getElementById('map').appendChild(coordsDiv);

            map.on('mousemove', (e) => {
                coordsDiv.innerText = `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
            });

            // Geolocation
            navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 13);
            });

            map.on('click', (e) => {
                if (isSectorMode) {
                    sectorPoints.push(e.latlng);
                    L.circleMarker(e.latlng, { radius: 5, color: 'orange' }).addTo(map);
                }
            });
        }

        function toggleSectorMode() {
            const btn = document.getElementById('sector-toggle');
            if (!isSectorMode) {
                isSectorMode = true;
                sectorPoints = [];
                btn.className = 'btn-orange px-3 py-2 rounded font-bold uppercase text-xs transition-colors';
                addToLog("Sector Creation Started");
            } else {
                finalizeSector();
                isSectorMode = false;
                btn.className = 'btn-grey px-3 py-2 rounded font-bold uppercase text-xs transition-colors';
            }
        }

        function finalizeSector() {
            if (sectorPoints.length === 0) return;

            const name = prompt("Enter Sector Name:");
            if (!name) return;

            if (sectorPoints.length === 1) {
                const pt = sectorPoints[0];
                L.marker(pt).addTo(map).bindPopup(name);
                addToLog(`Single Point Sector Added: ${name} [Lat: ${pt.lat.toFixed(4)}, Lng: ${pt.lng.toFixed(4)}]`);
            } else {
                const poly = L.polygon(sectorPoints, {
                    color: 'red',
                    fillColor: '#0000ff',
                    fillOpacity: 0.3
                }).addTo(map);

                // Add Label
                const center = poly.getBounds().getCenter();
                L.marker(center, {
                    icon: L.divIcon({ className: 'sector-label', html: name })
                }).addTo(map);

                poly.on('click', () => {
                    const action = prompt(`Sector: ${name}\nType 'RENAME' or 'DELETE'`).toUpperCase();
                    if (action === 'RENAME') {
                        const newName = prompt("New Name:");
                        addToLog(`Sector ${name} renamed to ${newName}`);
                    } else if (action === 'DELETE') {
                        map.removeLayer(poly);
                        addToLog(`Sector ${name} deleted`);
                    }
                });

                addToLog(`Polygon Sector Added: ${name}`);
            }
        }

        // --- WEATHER API ---
        async function fetchWeather() {
            try {
                const pos = map.getCenter();
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.lat}&longitude=${pos.lng}&current_weather=true`);
                const data = await res.json();
                const cw = data.current_weather;
                const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                const dir = directions[Math.round(cw.winddirection / 45) % 8];
                
                document.getElementById('weather').innerHTML = 
                    `TEMP: ${cw.temperature.toFixed(1)}°C | WIND: ${dir} @ ${cw.windspeed}km/h`;
            } catch (e) {
                document.getElementById('weather').innerText = "Weather Unavailable";
            }
        }

        // --- UNIT TABLE ---
        function addUnitRow() {
            const id = Date.now();
            const row = document.createElement('tr');
            row.className = 'border-b border-zinc-900 group';
            row.innerHTML = `
                <td class="py-2">
                    <input type="text" maxlength="20" placeholder="Description..." 
                        class="bg-transparent border-none focus:ring-0 w-full truncate unit-table-text"
                        title="Hover to see full text"
                        onchange="addToLog('Unit Update: ' + this.value)">
                </td>
                <td class="py-2">
                    <select class="bg-black text-xs border border-zinc-700 rounded" onchange="logPersonnel(this)">
                        ${Array.from({length: 50}, (_, i) => `<option>${i+1}</option>`).join('')}
                    </select>
                </td>
                <td class="py-2">
                    <button id="sitrep-${id}" onclick="resetSitrep('${id}')" 
                        class="bg-zinc-800 px-2 py-1 rounded text-[10px] w-16 sitrep-btn">00:00</button>
                </td>
            `;
            document.getElementById('unit-table-body').appendChild(row);
            startSitrep(id);
        }

        function logPersonnel(el) {
            const desc = el.closest('tr').querySelector('input').value || "Unnamed Unit";
            addToLog(`Unit [${desc}] Personnel updated to: ${el.value}`);
        }

        function startSitrep(id) {
            let sec = 0;
            sitrepTimers[id] = setInterval(() => {
                sec++;
                const m = Math.floor(sec / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                document.getElementById(`sitrep-${id}`).innerText = `${m}:${s}`;
            }, 1000);
        }

        function resetSitrep(id) {
            const desc = document.getElementById(`sitrep-${id}`).closest('tr').querySelector('input').value || "Unnamed Unit";
            addToLog(`SitRep Triggered for Unit: ${desc}`);
            clearInterval(sitrepTimers[id]);
            document.getElementById(`sitrep-${id}`).innerText = "00:00";
            startSitrep(id);
        }

        // --- LOGGING & PERSISTENCE ---
        function addToLog(action) {
            const timestamp = new Date().toLocaleString('en-AU', { hour12: false });
            const entry = { timestamp, action };
            
            const logs = JSON.parse(localStorage.getItem('incidentLogs') || '[]');
            logs.push(entry);
            localStorage.setItem('incidentLogs', JSON.stringify(logs));
            
            renderLogEntry(entry);
        }

        function renderLogEntry(entry) {
            const flow = document.getElementById('log-flow');
            const div = document.createElement('div');
            div.innerHTML = `<span class="opacity-50">[${entry.timestamp}]</span> ${entry.action}`;
            flow.prepend(div);
        }

        function loadLog() {
            const logs = JSON.parse(localStorage.getItem('incidentLogs') || '[]');
            logs.forEach(renderLogEntry);
        }

        function backupLog() {
            const logs = JSON.parse(localStorage.getItem('incidentLogs') || '[]');
            const text = logs.map(l => `[${l.timestamp}] ${l.action}`).join('\n');
            navigator.clipboard.writeText(text);
            alert("Log copied to clipboard!");
        }

        // --- MODALS ---
        function openModal(type) {
            currentModalAction = type;
            const overlay = document.getElementById('modal-overlay');
            const input = document.getElementById('modal-input');
            const title = document.getElementById('modal-title');
            
            overlay.classList.remove('hidden');
            title.innerText = type === 'incident' ? 'Update Incident Description' : 'Set Operator ID';
            input.value = '';
            input.focus();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        function saveModal() {
            const val = document.getElementById('modal-input').value;
            if (currentModalAction === 'incident') {
                document.getElementById('incident-display').innerText = val;
                addToLog(`Incident Description Changed: ${val}`);
            } else {
                document.getElementById('operator-display').innerText = val;
                addToLog(`Operator ID Changed: ${val}`);
            }
            closeModal();
        }
    </script>
</body>
</html>
